services:
  auth-proxy:
    image: nginx:alpine
    env_file: .env
    volumes:
      - ./proxy/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: unless-stopped

  claudebot:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      - auth-proxy
    volumes:
      - ~/.homekit_pairings.json:/home/appuser/.homekit_pairings.json:ro
      - ${GMAIL_CREDENTIALS_FILE:-/dev/null}:/home/appuser/gmail_credentials.json:ro
      - ${GMAIL_TOKEN_FILE:-/dev/null}:/home/appuser/gmail_token.json:rw
      - ./config:/app/config:ro
      - ./data:/app/data:rw
    environment:
      - ENABLE_MCP=true
      - SONOS_SPEAKER_IPS=${SONOS_SPEAKER_IPS}
      - HOMECLAW_MCP_URL=http://host.docker.internal:9876
      - CLAUDE_CODE_OAUTH_TOKEN=dummy-oauth-proxy-placeholder
      - ANTHROPIC_BASE_URL=http://auth-proxy:8080
      - SUPERUSER_IDS=${SUPERUSER_IDS}
      - GMAIL_CREDENTIALS_FILE=/home/appuser/gmail_credentials.json
      - GMAIL_TOKEN_FILE=/home/appuser/gmail_token.json
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-false}
      - SCHEDULER_TASKS_FILE=/app/config/tasks.yaml
      - SCHEDULER_STATE_FILE=/app/data/scheduler_state.json
      - SCHEDULER_TIMEZONE=${SCHEDULER_TIMEZONE:-US/Pacific}
      - FLIGHTS_ENABLED=${FLIGHTS_ENABLED:-false}
      - SKYSCANNER_LOCALE=${SKYSCANNER_LOCALE:-en-US}
      - SKYSCANNER_CURRENCY=${SKYSCANNER_CURRENCY:-USD}
      - SKYSCANNER_MARKET=${SKYSCANNER_MARKET:-US}
