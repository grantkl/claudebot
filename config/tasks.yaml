tasks:
- id: morning_email_digest
  name: Morning Email Digest
  prompt: 'Check my Gmail inbox for unread emails received in the last 12 hours.

    Summarize each email in 1-2 sentences, grouped by sender importance.

    If there are no unread emails, respond with NOTHING_TO_REPORT.

    '
  cron: 0 7 * * *
  mcp_servers:
  - gmail
  output: dm
  model: sonnet
  enabled: true
- id: important_email_alert
  name: Important Email Alert
  prompt: "1. List unread emails with gmail_list_emails(query=\"is:unread\", max_results=10).\n\
    2. If no results, respond with NOTHING_TO_REPORT.\n3. Collect the message IDs\
    \ and call gmail_check_alerted(message_ids=[...]).\n   This returns only IDs that\
    \ have NOT been alerted before.\n4. If no new IDs, respond with NOTHING_TO_REPORT.\n\
    5. For each new ID, check if the email is TIME-SENSITIVE \u2014 meaning it has\n\
    \   a deadline, expiring offer, limited-time window, upcoming event, or\n   required\
    \ action with a due date.\n6. Skip newsletters, digests, marketing without deadlines,\
    \ routine notifications.\n7. Report only time-sensitive new emails. If none qualify,\
    \ respond with NOTHING_TO_REPORT.\n"
  interval_seconds: 300
  mcp_servers:
  - gmail
  output: dm
  model: haiku
  enabled: true
- id: morning_smart_home
  name: Morning Smart Home Routine
  prompt: 'Execute the morning routine:

    1. Set living room and kitchen lights to 80% brightness, warm white

    2. Set thermostat to 72F

    Report what you''ve done.

    '
  cron: 30 6 * * 1-5
  mcp_servers:
  - homekit
  - sonos
  output: dm
  model: sonnet
  enabled: false
- id: evening_wind_down
  name: Evening Wind Down
  prompt: 'Dim all lights to 30% and set thermostat to 68F.

    Report what you''ve done.

    '
  cron: 0 22 * * *
  mcp_servers:
  - homekit
  output: dm
  model: sonnet
  enabled: false
- id: flight_price_checker
  name: Flight Price Watch Checker
  prompt: "Check flight prices for all active flight watches.\n1. Call flight_watch_list()\
    \ to get all active watches.\n2. If no active watches, respond with NOTHING_TO_REPORT.\n\
    3. For each watch, call search-flights with origin, destination, departure_date\n\
    \   (and return_date if set). Use 1 adult passenger.\n4. If the watch has \"airline\"\
    \ or \"flight_numbers\" set, filter the search results\n   to match only that\
    \ airline/flight number(s). Record the price for the matching\n   flight, not\
    \ the overall cheapest. If the specific flight isn't found in results,\n   note\
    \ that in the report.\n5. For each result, call flight_watch_record() with the\
    \ price found.\n6. Compare current price to previous price and max_price (booked\
    \ price):\n   - If the watch has max_price and current price < max_price, ALWAYS\
    \ report it\n     (the user can re-book at a lower price).\n   - Otherwise, report\
    \ if price dropped >10% from previous check.\n7. Summarize only noteworthy changes.\
    \ If none, respond with NOTHING_TO_REPORT.\n"
  cron: 0 */6 * * *
  mcp_servers:
  - flights
  - flight_watch
  output: dm
  model: sonnet
  enabled: true
- id: weather_kingston_wa
  name: Kingston WA Weather Check
  prompt: 'Search the web for the current weather in Kingston, Washington. Provide
    a concise summary including: current temperature, conditions (sunny, cloudy, rain,
    etc.), high/low for the day, and any notable weather alerts or upcoming changes
    in the forecast. Keep it brief and conversational.'
  cron: 0 15 * * 1-5
  mcp_servers: []
  output: dm
  model: haiku
  enabled: true
- id: found_north_lottery_reminder
  name: Found North Lottery Signup Reminder
  prompt: Send a DM reminding the user to sign up for the Found North lottery today.
    Keep it brief and friendly.
  cron: 0 9 3 3 *
  mcp_servers: []
  output: dm
  model: sonnet
  enabled: false
  run_once: true
- id: scheduler_timezone_reminder
  name: Update Scheduler Timezone Code Reminder
  prompt: 'Send a reminder: "Update the scheduler code to make timezone handling explicit.
    Here''s the thread for context: https://ex-eg-and-friends.slack.com/archives/D0AJBDYK7GQ/p1772557861486429"'
  cron: 0 17 3 3 *
  mcp_servers: []
  output: dm
  model: haiku
  enabled: false
  run_once: true
- id: reminder_scheduling_auth_users
  name: 'Reminder: Add scheduling for authorized users'
  prompt: "Send a reminder: \"\U0001F514 Reminder: Add scheduling to authorized users.\
    \ Also \u2014 scheduled tasks should be sent to specific people (not broadcast).\""
  cron: 0 1 4 3 *
  mcp_servers: []
  output: dm
  model: sonnet
  enabled: false
  run_once: true
- id: remind_enhance_5pm
  name: 'Reminder: Enhance this'
  prompt: 'Send a reminder: "Hey! Just a reminder to get back to enhancing that Flight
    of the Conchords presale alert email flagging workflow you were working on."'
  cron: 0 17 3 3 *
  mcp_servers: []
  output: dm
  model: sonnet
  enabled: false
  run_once: true
